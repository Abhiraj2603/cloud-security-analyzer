{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Security Reports</h2>

    <div class="row mt-4">

        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <h4>PDF Report</h4>
                    <button id="pdfBtn" class="btn btn-danger">
                        Generate PDF
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <h4>Excel Report</h4>
                    <button id="excelBtn" class="btn btn-success">
                        Generate Excel
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/reports.js') }}"></script>
{% endblock %}
